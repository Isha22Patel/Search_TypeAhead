services:
  postgres:
    image: postgres:16-alpine
    container_name: typeahead-postgres
    environment:
      POSTGRES_DB: typeahead
      POSTGRES_USER: typeahead
      POSTGRES_PASSWORD: typeahead
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U typeahead -d typeahead" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
